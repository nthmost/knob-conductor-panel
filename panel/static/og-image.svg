<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#02020e"/>
      <stop offset="100%" stop-color="#030318"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#003344"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#0a2a3a" stroke-width="1" opacity="0.4">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Top border line -->
  <line x1="60" y1="140" x2="1140" y2="140" stroke="#00e5ff" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>

  <!-- Diamond marker -->
  <text x="60" y="108" font-family="monospace" font-size="28" fill="#00e5ff" filter="url(#glow)">◈</text>

  <!-- Main title -->
  <text x="100" y="110" font-family="monospace" font-size="52" font-weight="bold" letter-spacing="8" fill="#00e5ff" filter="url(#glow-strong)">KNOB SYSTEMS MONITOR</text>

  <!-- Subtitle -->
  <text x="102" y="135" font-family="monospace" font-size="16" letter-spacing="4" fill="#1a4a5a">KNOB 87.9 FM  —  NOISEBRIDGE  —  SAN FRANCISCO</text>

  <!-- Equalizer bars (left section) -->
  <g transform="translate(80, 370)" filter="url(#glow)">
    <rect x="0"   y="0"   width="18" height="80"  fill="#00e5ff" opacity="0.9"/>
    <rect x="28"  y="30"  width="18" height="50"  fill="#00e5ff" opacity="0.9"/>
    <rect x="56"  y="10"  width="18" height="70"  fill="#00e5ff" opacity="0.9"/>
    <rect x="84"  y="40"  width="18" height="40"  fill="#00e5ff" opacity="0.9"/>
    <rect x="112" y="15"  width="18" height="65"  fill="#00e5ff" opacity="0.9"/>
    <rect x="140" y="50"  width="18" height="30"  fill="#00e5ff" opacity="0.9"/>
    <rect x="168" y="5"   width="18" height="75"  fill="#00e5ff" opacity="0.9"/>
    <rect x="196" y="25"  width="18" height="55"  fill="#00e5ff" opacity="0.9"/>
  </g>

  <!-- Now playing label -->
  <text x="80" y="360" font-family="monospace" font-size="12" letter-spacing="4" fill="#1a4a5a">NOW PLAYING</text>

  <!-- Artist name -->
  <text x="320" y="400" font-family="monospace" font-size="36" font-weight="bold" letter-spacing="2" fill="#00e5ff" filter="url(#glow)">PANDORA'S BOX</text>
  <text x="320" y="435" font-family="monospace" font-size="18" fill="#7ee8fa" opacity="0.8">AutoDJ  ·  KNOB 87.9 FM</text>

  <!-- Progress bar -->
  <rect x="320" y="455" width="560" height="3" fill="#0a2a3a" rx="1"/>
  <rect x="320" y="455" width="340" height="3" fill="url(#bar1)" rx="1" filter="url(#glow)"/>

  <!-- Instrument panel widgets (right side) -->

  <!-- Lamp 1 — green on -->
  <circle cx="870" cy="220" r="20" fill="#44cc44" filter="url(#glow-strong)" opacity="0.9"/>
  <circle cx="870" cy="220" r="20" fill="none" stroke="#0a2a3a" stroke-width="2"/>
  <text x="870" y="255" font-family="monospace" font-size="10" fill="#1a4a5a" text-anchor="middle" letter-spacing="1">STREAM</text>

  <!-- Lamp 2 — amber -->
  <circle cx="940" cy="220" r="20" fill="#C8960C" filter="url(#glow-strong)" opacity="0.9"/>
  <circle cx="940" cy="220" r="20" fill="none" stroke="#0a2a3a" stroke-width="2"/>
  <text x="940" y="255" font-family="monospace" font-size="10" fill="#1a4a5a" text-anchor="middle" letter-spacing="1">TX-A</text>

  <!-- Lamp 3 — blue -->
  <circle cx="1010" cy="220" r="20" fill="#0088ff" filter="url(#glow-strong)" opacity="0.85"/>
  <circle cx="1010" cy="220" r="20" fill="none" stroke="#0a2a3a" stroke-width="2"/>
  <text x="1010" y="255" font-family="monospace" font-size="10" fill="#1a4a5a" text-anchor="middle" letter-spacing="1">RF-IN</text>

  <!-- Lamp 4 — off -->
  <circle cx="1080" cy="220" r="20" fill="#0a1a2a"/>
  <circle cx="1080" cy="220" r="20" fill="none" stroke="#0a2a3a" stroke-width="2"/>
  <text x="1080" y="255" font-family="monospace" font-size="10" fill="#1a4a5a" text-anchor="middle" letter-spacing="1">EBS</text>

  <!-- Gauge arc -->
  <g transform="translate(960, 390)">
    <path d="M -70 0 A 70 70 0 0 1 70 0" fill="none" stroke="#0a2a3a" stroke-width="8" stroke-linecap="round"/>
    <path d="M -70 0 A 70 70 0 0 1 35 -60" fill="none" stroke="#00e5ff" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="0" y1="0" x2="28" y2="-52" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
    <text x="0" y="20" font-family="monospace" font-size="14" fill="#00e5ff" text-anchor="middle">128k</text>
    <text x="0" y="38" font-family="monospace" font-size="10" fill="#1a4a5a" text-anchor="middle" letter-spacing="2">BITRATE</text>
  </g>

  <!-- Blinken lights row -->
  <g transform="translate(830, 490)">
    <text x="0" y="0" font-family="monospace" font-size="10" fill="#1a4a5a" letter-spacing="3">BLINKEN</text>
    <circle cx="0"   cy="18" r="6" fill="#00e5ff" filter="url(#glow)" opacity="0.9"/>
    <circle cx="20"  cy="18" r="6" fill="#0a1a2a"/>
    <circle cx="40"  cy="18" r="6" fill="#00e5ff" filter="url(#glow)" opacity="0.7"/>
    <circle cx="60"  cy="18" r="6" fill="#0a1a2a"/>
    <circle cx="80"  cy="18" r="6" fill="#C8960C" filter="url(#glow)" opacity="0.9"/>
    <circle cx="100" cy="18" r="6" fill="#0a1a2a"/>
    <circle cx="120" cy="18" r="6" fill="#00e5ff" filter="url(#glow)" opacity="0.5"/>
    <circle cx="140" cy="18" r="6" fill="#44cc44" filter="url(#glow)" opacity="0.9"/>
    <circle cx="160" cy="18" r="6" fill="#0a1a2a"/>
    <circle cx="180" cy="18" r="6" fill="#00e5ff" filter="url(#glow)" opacity="0.8"/>
    <circle cx="200" cy="18" r="6" fill="#0a1a2a"/>
    <circle cx="220" cy="18" r="6" fill="#C8960C" filter="url(#glow)" opacity="0.6"/>
  </g>

  <!-- Bottom border -->
  <line x1="60" y1="560" x2="1140" y2="560" stroke="#0a2a3a" stroke-width="1"/>

  <!-- Footer -->
  <text x="60" y="585" font-family="monospace" font-size="12" letter-spacing="3" fill="#0a2a3a">github.com/nthmost/knob-conductor-panel</text>
  <text x="1140" y="585" font-family="monospace" font-size="12" letter-spacing="2" fill="#0a2a3a" text-anchor="end">CONDUCTOR OSS  ·  FASTAPI  ·  NOISEBRIDGE</text>
</svg>
