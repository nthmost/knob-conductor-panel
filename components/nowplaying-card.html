<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  NOW PLAYING CARD  —  KNOB panel design component               ║
  ║                                                                  ║
  ║  A self-contained now-playing display for an internet radio      ║
  ║  stream. Blade Runner color palette, hardcoded (no CSS vars)     ║
  ║  so it renders reliably regardless of theme context.             ║
  ║                                                                  ║
  ║  Dependencies (add to <head>):                                   ║
  ║    Google Fonts: Rajdhani:600, Share Tech Mono                   ║
  ║    <link href="https://fonts.googleapis.com/css2?                ║
  ║      family=Rajdhani:wght@600&family=Share+Tech+Mono&display=swap"
  ║      rel="stylesheet">                                           ║
  ║                                                                  ║
  ║  Backend API contract:                                           ║
  ║    GET /api/radio → { artist, title, source, remaining,          ║
  ║                        next_source, next_hour_fmt,               ║
  ║                        dj: { connected: bool } }                 ║
  ║    GET /stream    → audio/ogg or audio/mpeg live stream          ║
  ║    SSE /events    → radio_track, radio_dj event types            ║
  ║                                                                  ║
  ║  Elements updated by JS:                                         ║
  ║    #np-artist, #np-title, #np-source-badge                       ║
  ║    #np-elapsed, #np-remaining, #np-progress-fill                 ║
  ║    #np-next-val, #np-dj-badge, #np-playing-indicator             ║
  ╚══════════════════════════════════════════════════════════════════╝
-->

<!-- ═══════════ CSS ═══════════ -->
<style>
  /* card container — position:relative required for absolute children */
  #np-card {
    background: #080818;
    border: 1px solid #0a2a3a;
    padding: 1rem 1.1rem 0.9rem;
    margin-bottom: 8px;
    position: relative;
  }

  /* animated equalizer bars */
  #np-playing-indicator {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 18px;
    margin-bottom: 0.5rem;
  }
  #np-playing-indicator .bar {
    width: 4px;
    background: #00e5ff;
    animation: bounce 0.8s ease-in-out infinite alternate;
    box-shadow: 0 0 6px #00e5ff;
  }
  #np-playing-indicator .bar:nth-child(1) { height: 8px;  animation-delay: 0s;    animation-duration: 0.7s; }
  #np-playing-indicator .bar:nth-child(2) { height: 14px; animation-delay: 0.15s; animation-duration: 0.5s; }
  #np-playing-indicator .bar:nth-child(3) { height: 10px; animation-delay: 0.3s;  animation-duration: 0.9s; }
  #np-playing-indicator .bar:nth-child(4) { height: 16px; animation-delay: 0.1s;  animation-duration: 0.6s; }
  #np-playing-indicator.paused .bar { animation: none; height: 4px !important; }
  @keyframes bounce { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }

  /* source badge (e.g. "AUTODJ", "HARBOR") */
  #np-source-badge {
    display: inline-block;
    background: #0a2a3a;
    color: #00e5ff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    padding: 2px 7px;
    margin-bottom: 0.5rem;
  }

  /* artist name — large, prominent */
  #np-artist {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 1.55rem;
    color: #00e5ff;
    text-shadow: 0 0 14px rgba(0,229,255,0.4);
    line-height: 1.15;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.05em;
  }

  /* track title */
  #np-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem;
    color: #7ee8fa;
    line-height: 1.3;
    margin-bottom: 0.7rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* progress bar — drains from right as track plays */
  #np-progress-outer {
    height: 3px;
    background: #04040f;
    margin-bottom: 0.35rem;
    overflow: hidden;
  }
  #np-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #003344, #00e5ff);
    transition: width 1s linear;
    width: 100%;
    box-shadow: 0 0 6px #00e5ff;
  }

  /* elapsed / remaining timestamps */
  #np-time-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    color: #1a4a5a;
  }
  #np-remaining { color: #00e5ff; }

  /* ── circular stream play/pause button (top-right corner) ── */
  #np-audio { display: none; }
  #np-play-btn {
    position: absolute;
    top: 0.65rem; right: 0.65rem;
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1.5px solid #1a4a5a;
    background: #04040f;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, box-shadow 0.2s;
    padding: 0;
  }
  /* play triangle (CSS-only, no icon font needed) */
  #np-play-btn::after {
    content: '';
    display: block;
    width: 0; height: 0;
    border-style: solid;
    border-width: 7px 0 7px 13px;
    border-color: transparent transparent transparent #1a4a5a;
    margin-left: 3px;
    transition: border-color 0.2s;
  }
  /* pause icon: two bars via CSS gradient */
  #np-play-btn.playing::after {
    border: none;
    width: 10px; height: 14px;
    background: linear-gradient(to right,
      #00e5ff 0%, #00e5ff 35%,
      transparent 35%, transparent 65%,
      #00e5ff 65%, #00e5ff 100%);
    margin-left: 0;
  }
  #np-play-btn:hover {
    border-color: #00e5ff;
    box-shadow: 0 0 10px rgba(0,229,255,0.3);
  }
  #np-play-btn:hover::after { border-color: transparent transparent transparent #00e5ff; }
  #np-play-btn.playing {
    border-color: #00e5ff;
    animation: btn-pulse 1.8s ease-in-out infinite;
  }
  @keyframes btn-pulse {
    0%, 100% { box-shadow: 0 0 6px rgba(0,229,255,0.3); }
    50%       { box-shadow: 0 0 18px rgba(0,229,255,0.7); }
  }

  /* live DJ badge — pulsing red, appears below play button when DJ on air */
  #np-dj-badge {
    display: none;
    position: absolute;
    top: 2.4rem; right: 0.75rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: #ff003c;
    text-shadow: 0 0 8px #ff003c;
    animation: dj-pulse 1.1s ease-in-out infinite alternate;
  }
  #np-dj-badge.active { display: block; }
  @keyframes dj-pulse { from { opacity: 1; } to { opacity: 0.3; } }

  /* ── current program bar (sits below the card) ── */
  #np-next-bar {
    background: #04040f;
    border: 1px solid #0a2a3a;
    padding: 0.45rem 1rem;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
  }
  #np-next-label {
    color: #1a4a5a;
    letter-spacing: 0.14em;
    flex-shrink: 0;
    font-size: 0.65rem;
    text-transform: uppercase;
  }
  #np-next-val { color: #7ee8fa; }
</style>

<!-- ═══════════ HTML ═══════════ -->

<!-- Now Playing card -->
<div id="np-card">
  <audio id="np-audio" preload="none" src="/stream"></audio>
  <button id="np-play-btn" onclick="toggleStream()" title="Listen live"></button>
  <div id="np-dj-badge">🎙 LIVE DJ ON AIR</div>
  <div id="np-playing-indicator">
    <span class="bar"></span><span class="bar"></span>
    <span class="bar"></span><span class="bar"></span>
  </div>
  <div id="np-source-badge">AUTODJ</div>
  <div id="np-artist">—</div>
  <div id="np-title">—</div>
  <div id="np-progress-outer"><div id="np-progress-fill"></div></div>
  <div id="np-time-row">
    <span id="np-elapsed">0:00</span>
    <span id="np-remaining">--:--</span>
  </div>
</div>

<!-- Current program bar -->
<div id="np-next-bar">
  <span id="np-next-label">CURRENT PROGRAM</span>
  <span id="np-next-val">—</span>
</div>

<!-- ═══════════ JS ═══════════ -->
<script>
// ── Stream play/pause ──────────────────────────────────────────────────────
function toggleStream() {
  const audio = document.getElementById('np-audio');
  const btn   = document.getElementById('np-play-btn');
  if (audio.paused) {
    audio.play().then(() => btn.classList.add('playing')).catch(() => {});
  } else {
    audio.pause();
    btn.classList.remove('playing');
  }
  audio.onended = () => btn.classList.remove('playing');
}

// ── Progress countdown (call once per second) ──────────────────────────────
// Expects these globals set by the parent page (or set defaults here):
//   _npRemaining  — seconds remaining at last poll
//   _npPollTime   — Date.now() at last poll
//   _npInitial    — seconds remaining at track start (for bar width)
//   _npCountdown  — setInterval handle

window._npRemaining = 0;
window._npPollTime  = Date.now();
window._npInitial   = 0;
window._npCountdown = null;

function fmtSecs(s) {
  s = Math.max(0, Math.round(s));
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

function tickCountdown() {
  const elapsed = (Date.now() - _npPollTime) / 1000;
  const cur     = Math.max(0, _npRemaining - elapsed);
  const elap    = _npInitial > 0 ? Math.max(0, _npInitial - cur) : elapsed;

  const remEl  = document.getElementById('np-remaining');
  const elapEl = document.getElementById('np-elapsed');
  const fill   = document.getElementById('np-progress-fill');

  if (remEl)  remEl.textContent  = fmtSecs(cur);
  if (elapEl) elapEl.textContent = fmtSecs(elap);
  if (fill && _npInitial > 0)
    fill.style.width = Math.max(0, (cur / _npInitial) * 100) + '%';
}

function startCountdown() {
  if (_npCountdown) clearInterval(_npCountdown);
  _npCountdown = setInterval(tickCountdown, 1000);
}

// ── Apply data from /api/radio ─────────────────────────────────────────────
function applyRadioData(d) {
  const artist   = d.artist || '';
  const title    = d.title  || '—';
  const source   = d.source || '';
  const nextSrc  = d.next_source   || '';
  const nextHour = d.next_hour_fmt || '';
  const dj       = d.dj || {};
  const newRem   = d.remaining || 0;

  const trackKey = `${artist}|${title}`;
  if (trackKey !== applyRadioData._lastTrack) {
    applyRadioData._lastTrack = trackKey;
    _npInitial = newRem;
  }
  _npRemaining = newRem;
  _npPollTime  = Date.now();

  const artistEl  = document.getElementById('np-artist');
  const titleEl   = document.getElementById('np-title');
  const badgeEl   = document.getElementById('np-source-badge');
  const nextEl    = document.getElementById('np-next-val');
  const djBadge   = document.getElementById('np-dj-badge');
  const indicator = document.getElementById('np-playing-indicator');

  if (artistEl)  artistEl.textContent  = artist || '—';
  if (titleEl)   titleEl.textContent   = title;
  if (badgeEl)   badgeEl.textContent   = source || 'AUTODJ';
  if (nextEl)    nextEl.textContent    = nextSrc ? `${nextSrc} until ${nextHour}` : '—';
  if (djBadge)   djBadge.classList.toggle('active', !!dj.connected);
  if (indicator) indicator.classList.toggle('paused', !dj.connected && !artist);

  tickCountdown();
}
applyRadioData._lastTrack = '';

async function updateRadio() {
  try {
    const r = await fetch('/api/radio');
    applyRadioData(await r.json());
  } catch(e) { /* ignore */ }
}

// Boot
updateRadio();
setInterval(updateRadio, 5000);
startCountdown();
</script>
